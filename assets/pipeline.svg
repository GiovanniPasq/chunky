<svg width="780" viewBox="0 0 780 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="151" y="30" width="440" height="370" rx="14" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text font-family="sans-serif" font-size="12" fill="#1D9E75" x="371" y="23" text-anchor="middle">Chunky validates here</text>

  <!-- PDF -->
  <rect x="30" y="40" width="100" height="80" rx="8" fill="#2e2e2e" stroke="#555" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#d0d0d0" x="80" y="80" text-anchor="middle" dominant-baseline="central">PDF</text>
  <line x1="130" y1="80" x2="169" y2="80" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- MARKDOWN -->
  <rect x="172" y="40" width="160" height="80" rx="8" fill="#0F6E56"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#E1F5EE" x="252" y="68" text-anchor="middle" dominant-baseline="central">Markdown</text>
  <text font-family="sans-serif" font-size="12" fill="#9FE1CB" x="252" y="96" text-anchor="middle" dominant-baseline="central">conversion</text>
  <line x1="332" y1="80" x2="407" y2="80" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CHUNKING -->
  <rect x="410" y="40" width="160" height="80" rx="8" fill="#0F6E56"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#E1F5EE" x="490" y="68" text-anchor="middle" dominant-baseline="central">Chunking</text>
  <text font-family="sans-serif" font-size="12" fill="#9FE1CB" x="490" y="96" text-anchor="middle" dominant-baseline="central">splitting</text>
  <line x1="570" y1="80" x2="609" y2="80" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- INDEX -->
  <rect x="612" y="40" width="100" height="80" rx="8" fill="#2e2e2e" stroke="#555" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#d0d0d0" x="662" y="80" text-anchor="middle" dominant-baseline="central">Index</text>

  <!-- drop lines -->
  <line x1="252" y1="120" x2="252" y2="178" stroke="#A32D2D" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="490" y1="120" x2="490" y2="178" stroke="#A32D2D" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- BROKEN MARKDOWN -->
  <rect x="172" y="180" width="160" height="80" rx="8" fill="#5a1f1f"/>
  <text font-family="sans-serif" font-size="13" font-weight="500" fill="#F09595" x="252" y="208" text-anchor="middle" dominant-baseline="central">Broken Markdown</text>
  <text font-family="sans-serif" font-size="11" fill="#cd6060" x="252" y="236" text-anchor="middle" dominant-baseline="central">noise, lost tables, artifacts</text>

  <!-- BROKEN CHUNKS -->
  <rect x="410" y="180" width="160" height="80" rx="8" fill="#5a1f1f"/>
  <text font-family="sans-serif" font-size="13" font-weight="500" fill="#F09595" x="490" y="208" text-anchor="middle" dominant-baseline="central">Broken chunks</text>
  <text font-family="sans-serif" font-size="11" fill="#cd6060" x="490" y="236" text-anchor="middle" dominant-baseline="central">bad splits, missing context</text>

  <!-- connectors -->
  <line x1="252" y1="260" x2="252" y2="298" stroke="#A32D2D" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="490" y1="260" x2="490" y2="298" stroke="#A32D2D" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="252" y1="298" x2="490" y2="298" stroke="#A32D2D" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="371" y1="298" x2="371" y2="308" stroke="#A32D2D" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- RETRIEVAL FAILS -->
  <rect x="291" y="310" width="160" height="80" rx="8" fill="#5a1f1f"/>
  <text font-family="sans-serif" font-size="13" font-weight="500" fill="#F09595" x="371" y="338" text-anchor="middle" dominant-baseline="central">Retrieval fails</text>
  <text font-family="sans-serif" font-size="11" fill="#cd6060" x="371" y="366" text-anchor="middle" dominant-baseline="central">hallucinations, low recall</text>
</svg>
